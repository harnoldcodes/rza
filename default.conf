server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The app has no build step; always revalidate the source files.
    add_header Cache-Control "no-cache";

    # Vendored three.js may cache briefly.
    location /vendor/ {
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
